<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Contato SENAC</title>
</head>
<body>
<img src="https://yt3.googleusercontent.com/ytc/AIdro_mTNf52djkZfDyqDR_-oyyFsy4EHDD5VFBV1U75zr_0HKA=s900-c-k-c0x00ffffff-no-rj" width="75px">
    <h1>Entre em Contato Conosco</h1>
    <a href="Trabalhoedna.html">Início</a>
    <a href="Nossoscursos.html"></a>

    <h2>Formulário de Contato</h2>

    <form>

        <fieldset>
            <legend>Dados Pessoais</legend>

            <label>Nome:</label><br>
            <input type="text" name="nome"><br><br>

            <label>E-mail:</label><br>
            <input type="email" name="email"><br><br>

        </fieldset>

        <br>

        <fieldset>
            <legend>Escolha de Cursos</legend>

            <label>Curso de Interesse:</label>
            <select name="curso">
                <option>Desenvolvimento Web</option>
                <option>Administração</option>
                <option>Design Gráfico</option>
            </select>

            <br><br>

            <label>Modalidade:</label><br>
            <input type="radio" name="modalidade" value="presencial"> Presencial
            <input type="radio" name="modalidade" value="online"> Online

        </fieldset>

        <br>

        <label>Quantidade de Vagas:</label><br>
        <input type="number" name="vagas" value="1"><br><br>

        <label>Mensagem ou Dúvida:</label><br>
        <textarea name="mensagem" rows="4" cols="40"></textarea><br><br>

         <button><a href="Agradecimento.html">Enviar</a></button>
    

    </form>

    <p>© 2025 SENAC - Serviço Nacional de Aprendizagem Comercial</p>

</body>
</html>
